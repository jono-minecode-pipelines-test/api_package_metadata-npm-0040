{
    "name": "1-liners",
    "version": "0.2.7",
    "description": "Useful oneliners and shorthand functions",
    "license": "MIT",
    "repository": {
        "type": "git",
        "url": "https://github.com/1-liners/1-liners"
    },
    "author": {
        "name": "stoeffel",
        "email": "schtoeffel@gmail.com",
        "url": "schtoeffel.ch"
    },
    "engines": {
        "node": ">=0.10.0"
    },
    "scripts": {
        "precommit": "npm run docs && git add documentation && npm run create-index && git add module/index.js",
        "prepush": "npm test",
        "develop": "nodangel --watch module --watch tests --exec 'npm --silent test'",
        "istanbul": "istanbul cover ./node_modules/mocha/bin/_mocha  -- --report lcov --compilers js:babel/register --ui qunit ./tests",
        "docs": "babel-node ./utils/createDocs.js; npm run toc;",
        "toc": "doctoc ./documentation/README.md",
        "mocha": "mocha --compilers js:babel/register --ui qunit ./tests",
        "compile": "cd ./module; babel --loose=all ./*.js --out-dir ../",
        "clean": "rm *.js",
        "coverage": "npm run compile; npm run istanbul; npm run clean",
        "coveralls": "npm run compile && npm run istanbul  && cat ./coverage/lcov.info | ./node_modules/coveralls/bin/coveralls.js && npm run clean",
        "test": "npm run coverage",
        "create-index": "babel-node ./utils/createIndex.js",
        "prepublish": "npm run create-index; npm run compile"
    },
    "files": [
        "/*.js",
        "/module/",
        "/license",
        "/readme.md"
    ],
    "keywords": [
        "oneliners",
        "shorthands"
    ],
    "dependencies": {},
    "devDependencies": {
        "babel": "^5.1.10",
        "coveralls": "^2.11.2",
        "doctoc": "^0.12.0",
        "dox": "^0.7.1",
