{
    "name": "1-liners",
    "version": "0.1.0",
    "description": "Useful oneliners and shorthand functions",
    "license": "MIT",
    "repository": {
        "type": "git",
        "url": "https://github.com/stoeffel/1-liners"
    },
    "author": {
        "name": "stoeffel",
        "email": "schtoeffel@gmail.com",
        "url": "schtoeffel.ch"
    },
    "engines": {
        "node": ">=0.10.0"
    },
    "scripts": {
        "develop": "nodangel --watch module --watch tests --exec 'npm test'",
        "istanbul": "istanbul cover ./node_modules/mocha/bin/_mocha  -- -R nyan --report lcov --compilers js:babel/register --ui qunit ./tests",
        "toc": "doctoc ./readme.md",
        "mocha": "mocha --compilers js:babel/register --ui qunit ./tests",
        "compile": "cd ./module; babel --loose=all ./*.js --out-dir ../",
        "clean": "rm *.js",
        "coverage": "npm run compile; npm run istanbul; npm run clean",
        "coveralls": "npm run compile; npm run istanbul  && cat ./coverage/lcov.info | ./node_modules/coveralls/bin/coveralls.js; npm run clean",
        "test": "npm run coveralls",
        "prepublish": "npm run compile"
    },
    "files": [
        "/*.js",
        "/module/",
        "/license",
        "/readme.md"
    ],
    "keywords": [
        "oneliners",
        "shorthands"
    ],
    "dependencies": {},
    "devDependencies": {
        "babel": "^5.1.10",
        "coveralls": "^2.11.2",
